<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ella Wong | Creative Art Director</title>
<link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" as="script">
<link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" as="script">
<link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js" as="script">
<link rel="dns-prefetch" href="https://images.squarespace-cdn.com">
<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://open.spotify.com">
<script src="https://open.spotify.com/embed/iframe-api/v1" async></script>
<!-- Critical fonts loaded immediately (hero + loading screen) -->
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Montserrat:wght@700;900&family=Press+Start+2P&family=Staatliches&family=Work+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<!-- Secondary fonts loaded async (section titles) -->
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Antic+Didone&family=DotGothic16&family=Libre+Bodoni:ital,wght@1,400;1,700&display=swap" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Antic+Didone&family=DotGothic16&family=Libre+Bodoni:ital,wght@1,400;1,700&display=swap" rel="stylesheet"></noscript>
<style>
/* ===== CUSTOM PROPERTIES ===== */
:root {
  --blue: #4100F5;
  --citric: #CDF564;
  --aqua: #9BF0E1;
  --fushia: #F037A5;
  --tang: #FF4632;
  --black: #191414;
  --white: #ffffff;
  --gray: #a0a39d;
  --f-title: 'Montserrat', sans-serif;
  --f-pixel: 'Press Start 2P', cursive;
  --f-body: 'Work Sans', sans-serif;
  --shadow: 8px 8px 0px var(--black);
  --shadow-sm: 4px 4px 0px var(--black);
}

/* ===== RESET ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;overflow-x:hidden}
body{font-family:var(--f-body);font-weight:300;color:var(--black);background:var(--white);overflow-x:hidden;-webkit-font-smoothing:antialiased;cursor:none}
a,button,[role="button"]{cursor:none}

/* ===== CUSTOM CURSOR ===== */
.custom-cursor{position:fixed;top:0;left:0;z-index:99999;pointer-events:none;will-change:transform}
.cursor-ring{width:28px;height:28px;border:1px solid var(--fushia);border-radius:50%;position:absolute;top:-14px;left:-14px;transition:width .25s cubic-bezier(.22,1,.36,1),height .25s cubic-bezier(.22,1,.36,1),top .25s cubic-bezier(.22,1,.36,1),left .25s cubic-bezier(.22,1,.36,1),border-color .25s,opacity .25s}
.cursor-dot{width:5px;height:5px;background:var(--fushia);border-radius:50%;position:absolute;top:-2.5px;left:-2.5px}
.custom-cursor.hovering .cursor-ring{width:44px;height:44px;top:-22px;left:-22px;border-color:var(--citric);opacity:.6}
.custom-cursor.hovering .cursor-dot{background:var(--citric)}
@media(max-width:768px){.custom-cursor{display:none}body{cursor:auto}a,button,[role="button"]{cursor:pointer}}
h1,h2,h3,h4,h5,h6{font-family:var(--f-title);font-weight:900}
::selection{background:var(--tang);color:#fff}
img{max-width:100%;display:block}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* ===== GRAIN TEXTURE OVERLAY ===== */
body::after{content:'';position:fixed;inset:0;z-index:99998;pointer-events:none;opacity:.035;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:180px 180px;mix-blend-mode:multiply}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:var(--black)}
::-webkit-scrollbar-thumb{background:var(--citric);border:2px solid var(--black)}

/* ===== SMOOTH SCROLL LENIS-STYLE (CSS only) ===== */
@media (prefers-reduced-motion: no-preference) {
  html { scroll-behavior: smooth; }
}

/* ===== BACKGROUNDS ===== */
.bg-grid-citric {
  background-color: var(--citric);
  background-image:
    linear-gradient(rgba(25,20,20,.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(25,20,20,.08) 1px, transparent 1px);
  background-size: 20px 20px;
}
.bg-grid-aqua {
  background-color: var(--aqua);
  background-image:
    linear-gradient(rgba(25,20,20,.12) 1px, transparent 1px),
    linear-gradient(90deg, rgba(25,20,20,.12) 1px, transparent 1px);
  background-size: 16px 16px;
}

/* ===== NAVIGATION ===== */
.nav{display:none}
.nav-item{flex:1;border-right:1px solid rgba(0,0,0,.08);cursor:pointer;position:relative;transition:background .3s,transform .2s cubic-bezier(.34,1.56,.64,1)}
.nav-item:last-child{border-right:none}
.nav-item:hover,.nav-item.active{background:rgba(255,255,255,.35)}
.nav-label{padding:14px 12px;text-align:center;font-family:var(--f-body);text-transform:lowercase;letter-spacing:-.02em;font-size:.9rem;font-weight:500}
.nav-bar-track{height:3px;border-top:1px solid rgba(0,0,0,.08);padding:0 2px 1px}
.nav-bar-fill{height:100%;background:var(--black);border-radius:99px;width:0;transition:width .5s cubic-bezier(.22,1,.36,1)}
.nav-item:hover .nav-bar-fill,.nav-item.active .nav-bar-fill{width:100%}
@media(max-width:768px){.nav-label{font-size:.4rem;padding:10px 4px;letter-spacing:.02em}.nav-hide-m{display:none}}

/* ===== HERO ===== */
.hero-outer{background-color:var(--black);background-image:linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px);background-size:20px 20px;position:relative;z-index:2}
.hero{position:relative;display:block;overflow:visible;padding:1.5vh 0 0;min-height:100vh;z-index:10}
.hero::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:60%;height:60%;background-image:linear-gradient(45deg,rgba(255,255,255,.12)25%,transparent 25%,transparent 75%,rgba(255,255,255,.12)75%),linear-gradient(45deg,rgba(255,255,255,.12)25%,transparent 25%,transparent 75%,rgba(255,255,255,.12)75%);background-size:40px 40px;background-position:0 0,20px 20px;opacity:.35;pointer-events:none;z-index:0}

.title-name-wrap{position:relative;width:100%;overflow:visible;z-index:3;padding-top:.5vh}
.tama-pos{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:30;pointer-events:none;width:auto}
.tama-pos>*{pointer-events:auto}
.tama-float{position:relative;z-index:30;pointer-events:auto;display:flex;justify-content:center;padding:0}

/* ===== HERO OBJECTS LAYER (draggable collage) ===== */
.hero-objects{position:absolute;inset:0;pointer-events:none;z-index:5;overflow:visible}
.hero-obj{position:absolute;pointer-events:auto;user-select:none;-webkit-user-select:none;-webkit-user-drag:none;touch-action:none;cursor:grab;will-change:transform;filter:drop-shadow(6px 8px 12px rgba(0,0,0,.55))}
.hero-obj.dragging{cursor:grabbing;z-index:40;transition:none !important;filter:drop-shadow(10px 14px 24px rgba(0,0,0,.7))}
.hero-obj:not(.dragging){transition:transform .28s cubic-bezier(.22,1,.36,1),filter .3s}
.hero-obj img{display:block;width:100%;height:auto;pointer-events:none;-webkit-user-drag:none}
.hero-obj.bead{filter:drop-shadow(3px 4px 6px rgba(0,0,0,.45))}
.hero-obj:hover:not(.dragging){filter:drop-shadow(8px 12px 16px rgba(0,0,0,.6)) brightness(1.05)}
@media(max-width:900px){.hero-obj{filter:drop-shadow(3px 4px 8px rgba(0,0,0,.5))}}

/* ===== MOBILE HERO LAYOUT OVERRIDES ===== */
/* On narrow viewports, the tamagotchi sits centered and covers most of the hero.
   Reposition the vinyl, stroopwafel, and bead letters so nothing is hidden
   behind the tamagotchi and the ART DIRECTOR beads don't overlap. */
@media(max-width:768px){
  /* Vinyl: move to top-left corner, above tamagotchi */
  .vinyl-player{top:14% !important;left:20% !important;width:34vw !important}
  /* Stroopwafel: top-right corner, clear of tamagotchi */
  .hero-obj[data-id="stroopwafel"]{top:10% !important;left:82% !important;width:26vw !important}
  /* Boarding pass: tuck into upper-right behind stroopwafel zone */
  .hero-obj[data-id="ticket"]{top:24% !important;left:80% !important;width:40vw !important}
  /* Polaroid 180 camera: bottom-right, below tama */
  .hero-obj[data-id="polaroid-cam"]{top:74% !important;left:78% !important;width:28vw !important}
  /* Polaroid photo: bottom-left, above ART beads */
  .hero-obj[data-id="polaroid-me"]{top:74% !important;left:26% !important;width:22vw !important}
  /* Magic card: lower-left */
  .hero-obj[data-id="mtg"]{top:70% !important;left:12% !important;width:20vw !important}
  /* Snow ticket: nestle near magic card */
  .hero-obj[data-id="snowlift"]{top:62% !important;left:8% !important;width:14vw !important}
  /* Skateboard: right edge mid-height */
  .hero-obj[data-id="surfskate"]{top:60% !important;left:92% !important;width:20vw !important}

  /* Beads: 30% smaller than before + stack ART (row 1) above DIRECTOR (row 2) */
  .hero-obj.bead{width:5.6vw !important;min-width:17px}
  /* ART row — centered, tighter spacing for smaller beads */
  .hero-obj.bead[data-id="b-A"]  {top:89% !important; left:43% !important}
  .hero-obj.bead[data-id="b-R"]  {top:90% !important; left:50% !important}
  .hero-obj.bead[data-id="b-T"]  {top:89% !important; left:57% !important}
  /* DIRECTOR row — spread across the width with tightened spacing */
  .hero-obj.bead[data-id="b-D"]  {top:95% !important; left:12% !important}
  .hero-obj.bead[data-id="b-I"]  {top:96% !important; left:21% !important}
  .hero-obj.bead[data-id="b-R2"] {top:95% !important; left:30% !important}
  .hero-obj.bead[data-id="b-E"]  {top:96% !important; left:39% !important}
  .hero-obj.bead[data-id="b-C"]  {top:95% !important; left:48% !important}
  .hero-obj.bead[data-id="b-T2"] {top:96% !important; left:57% !important}
  .hero-obj.bead[data-id="b-O"]  {top:95% !important; left:66% !important}
  .hero-obj.bead[data-id="b-R3"] {top:96% !important; left:75% !important}
}

/* ===== VINYL PLAYER ===== */
.vinyl-player{position:absolute;pointer-events:auto;user-select:none;-webkit-user-select:none;-webkit-user-drag:none;touch-action:none;cursor:grab;will-change:transform;filter:drop-shadow(8px 10px 14px rgba(0,0,0,.45));z-index:14;transform:translateZ(0)}
.vinyl-player.dragging{cursor:grabbing;z-index:60;filter:none}
.vinyl-player:not(.dragging){transition:transform .28s cubic-bezier(.22,1,.36,1)}
.vinyl-stage{position:relative;width:100%;aspect-ratio:1623/1103}
/* Vinyl slides within the stage. In the PNG, vinyl naturally sits on the right. */
/* "Closed" state: translate fully left so only a sliver peeks from behind the cover. */
.vinyl-slider{position:absolute;inset:0;z-index:1;transform:translateX(-18%);transition:transform 1.05s cubic-bezier(.6,.02,.3,1)}
.vinyl-player.playing .vinyl-slider{transform:translateX(0);transition:transform 1.05s cubic-bezier(.22,1,.36,1) .1s}
.vinyl-slider img{width:100%;height:100%;display:block;-webkit-user-drag:none;pointer-events:none;
  /* Vinyl disc center within PNG ≈ (1088,551) of 1623×1103 → (67%, 50%) */
  transform-origin:67% 50%;
  will-change:transform}
.vinyl-cover-img{position:absolute;top:0;left:0;width:100%;height:100%;z-index:2;pointer-events:none;-webkit-user-drag:none;display:block}
/* Cover center within PNG ≈ (551,551) of 1623×1103 → (34%, 50%) */
.vinyl-play-btn{position:absolute;z-index:5;top:50%;left:34%;transform:translate(-50%,-50%);width:15%;aspect-ratio:1;border-radius:50%;background:rgba(0,0,0,.65);border:2px solid rgba(255,255,255,.95);cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;padding:0;opacity:.75;transition:opacity .25s,background .2s,transform .2s;box-shadow:0 4px 14px rgba(0,0,0,.5)}
.vinyl-play-btn:hover{background:rgba(0,0,0,.85);transform:translate(-50%,-50%) scale(1.1)}
.vinyl-player:hover .vinyl-play-btn,.vinyl-player.playing .vinyl-play-btn,.vinyl-play-btn:focus-visible{opacity:1}
.vinyl-play-btn svg{width:46%;height:46%;display:block}
/* Progress ring around the play button during the 30s preview */
.vinyl-progress-ring{position:absolute;top:50%;left:34%;transform:translate(-50%,-50%);width:17%;aspect-ratio:1;z-index:3;pointer-events:none;opacity:0;transition:opacity .25s}
.vinyl-player.playing .vinyl-progress-ring{opacity:1}
.vinyl-progress-ring circle{fill:none;stroke-width:3.5;stroke-linecap:round}
.vinyl-progress-ring .track{stroke:rgba(255,255,255,.25)}
.vinyl-progress-ring .bar{stroke:#F2ECD9;transform-origin:center;transform:rotate(-90deg);transition:stroke-dashoffset .25s linear}
/* Spotify embed is the real audio source but hidden visually — it sits
   behind the cover art (z:0 < slider z:1 < cover z:2) so the user only
   sees the vinyl. opacity:0 keeps it invisible while still letting the
   browser treat it as a normal, rendered iframe (required for playback). */
.vinyl-spotify-embed{position:absolute;top:50%;left:34%;width:70%;height:30%;transform:translate(-50%,-50%);opacity:0;pointer-events:none;z-index:0;overflow:hidden;border-radius:10px}
.vinyl-spotify-embed iframe{width:100%;height:100%;border:0;display:block}

.tama-float>*{transform-origin:center center}

/* ===== HERO FLOATING LABELS ===== */
.hero-labels{position:absolute;inset:0;pointer-events:none;z-index:40}
.hero-label{position:absolute;pointer-events:auto;transition:transform .4s cubic-bezier(.34,1.56,.64,1);filter:drop-shadow(3px 3px 0 rgba(0,0,0,.15))}
.hero-label:hover{transform:scale(1.08) rotate(-2deg)}
.hero-label img{display:block;width:100%}
.hero-label--creative{width:59%;top:10%;left:-24%;z-index:2;animation:labelFloat1 3s ease-in-out infinite}
.hero-label--art-director{width:58%;top:18%;left:-30%;z-index:1;animation:labelFloat2 3.5s ease-in-out infinite}
.hero-label--design{width:48%;top:46%;right:-18%;z-index:1;animation:labelFloat3 2.8s ease-in-out infinite}
.hero-label--ideas{width:54%;top:54%;right:-24%;z-index:2;animation:labelFloat4 3.2s ease-in-out infinite}
.hero-label--photography{width:54%;top:62%;right:-28%;z-index:1;animation:labelFloat5 3.6s ease-in-out infinite}
@keyframes labelFloat1{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes labelFloat2{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes labelFloat3{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes labelFloat4{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes labelFloat5{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@media(max-width:768px){
  .hero-label--creative{width:49%;top:8%;left:-10%}
  .hero-label--art-director{width:48%;top:16%;left:-12%}
  .hero-label--design{width:38%;top:44%;right:-4%}
  .hero-label--ideas{width:44%;top:52%;right:-8%}
  .hero-label--photography{width:44%;top:60%;right:-12%}
}

.title-name{font-family:'Black Han Sans',var(--f-title);font-size:8vw;font-weight:400;line-height:.88;letter-spacing:-.01em;color:var(--tang);position:relative;z-index:3;padding:0;margin:0;white-space:nowrap;display:flex;justify-content:center;align-items:flex-start;gap:.25em;width:100%}
.title-word{display:inline-block;line-height:.88}
@media(max-width:768px){
  .title-name{flex-direction:column;align-items:center;gap:0;width:100%}
  .title-word{display:block}
}

/* ===== PIXEL SPEECH BUBBLES ===== */
.pixel-bubbles-wrap{position:absolute;top:0;left:0;right:0;bottom:0;z-index:40;pointer-events:none}
.pixel-bubble-svg{position:absolute;image-rendering:pixelated;filter:drop-shadow(3px 3px 0 rgba(0,0,0,.3));will-change:transform}
.pixel-bubble-svg.bubble-creative{top:-10px;left:-55px;width:170px;animation:bubbleFloat 3.5s ease-in-out infinite;transform:rotate(-3deg)}
.pixel-bubble-svg.bubble-artdir{bottom:10px;right:-60px;width:200px;animation:bubbleFloat 3s ease-in-out infinite 1.2s;transform:rotate(2deg)}
@media(max-width:768px){
  .pixel-bubble-svg.bubble-creative{width:115px;left:-15px;top:-8px}
  .pixel-bubble-svg.bubble-artdir{width:140px;right:-20px;bottom:5px}
}
@media(max-width:480px){
  .pixel-bubble-svg.bubble-creative{width:95px;left:-4px;top:-5px}
  .pixel-bubble-svg.bubble-artdir{width:110px;right:-6px;bottom:2px}
}
@keyframes bubbleFloat{0%,100%{transform:translateY(0) rotate(var(--rot,0deg))}50%{transform:translateY(-7px) rotate(var(--rot,0deg))}}

/* ===== TAMAGOTCHI SHELL ===== */
.tama-shell{background:url(tama-shell.png) center/contain no-repeat;border:none;border-radius:0;box-shadow:none;padding:0;width:399px;max-width:79vw;aspect-ratio:0.851;position:relative;display:flex;flex-direction:column;align-items:center;will-change:transform;contain:layout style;animation:tamaFloat 3.4s ease-in-out infinite;filter:drop-shadow(10px 10px 0 rgba(0,0,0,.35))}
@media(max-width:768px){.tama-shell{width:60vw;max-width:60vw}}
@media(max-width:480px){.tama-shell{width:55vw;max-width:55vw}}
@keyframes tamaFloat{0%,100%{transform:translateY(0);filter:drop-shadow(14px 14px 0 rgba(0,0,0,.35))}50%{transform:translateY(-10px);filter:drop-shadow(14px 20px 0 rgba(0,0,0,.3))}}
.tama-shell:hover{transform:translateY(-10px) rotate(-1.5deg);filter:drop-shadow(16px 22px 0 rgba(0,0,0,.3))}
.tama-frame{position:absolute;top:32.6%;left:30.8%;width:38.5%;background:transparent;border:none;border-radius:0;padding:0;margin:0;box-shadow:none}
.tama-screen{width:100%;aspect-ratio:0.965;border:none;border-radius:4px;position:relative;overflow:hidden;box-shadow:none;display:flex;flex-direction:column}
.tama-hud{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;font-family:var(--f-pixel);font-size:.55rem;position:relative;z-index:2}
.hud-dots{display:flex;gap:3px}
.hud-dot{width:4px;height:4px;background:var(--black)}
.tama-avatar{flex:1;display:flex;justify-content:center;align-items:center;z-index:2;padding-bottom:0;overflow:visible}
.tama-avatar svg{display:block;max-width:100%;max-height:100%;width:auto;height:auto}
.tama-status{position:absolute;bottom:6px;left:0;right:0;text-align:center;font-family:var(--f-pixel);font-size:.4rem;color:var(--black);z-index:3;transition:opacity .3s}

/* Tama buttons */
.tama-btns{position:absolute;bottom:13%;left:0;right:0;display:flex;justify-content:center;gap:2rem;margin:0}
.tama-btn{position:relative}
.tama-btn-dot{width:24px;height:24px;border-radius:50%;background:transparent;border:none;box-shadow:none;cursor:pointer;transition:all .15s}
.tama-btn-dot:active{transform:translate(1px,1px)}
.tama-btn-dot:hover{background:rgba(255,255,255,.15);transform:scale(1.1)}
.tama-btn-tip{position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%) translateY(4px);background:var(--white);border:2px solid var(--black);font-family:var(--f-pixel);font-size:.5rem;padding:4px 8px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s}
.tama-btn:hover .tama-btn-tip{opacity:1;transform:translateX(-50%) translateY(0)}
.tama-btn:nth-child(2){margin-top:4px}

/* ===== FLOATING TAMAGOTCHI ===== */
.floater{position:fixed;bottom:20px;right:20px;z-index:9999;width:110px;opacity:0;pointer-events:none;transform:translateY(40px) scale(.85);transition:opacity .7s cubic-bezier(.22,1,.36,1),transform .7s cubic-bezier(.22,1,.36,1)}
.floater.show{opacity:1;pointer-events:auto;transform:translateY(0) scale(1)}
.mini-shell{background:url(tama-shell.png) center/contain no-repeat;border:none;border-radius:0;box-shadow:none;padding:0;aspect-ratio:0.851;display:flex;flex-direction:column;align-items:center;position:relative;animation:bob 2.5s ease-in-out infinite;cursor:pointer;transition:transform .3s,filter .3s;will-change:transform;filter:drop-shadow(4px 4px 0 rgba(0,0,0,.3))}
.mini-shell:hover{transform:scale(1.08) translateY(-2px);filter:drop-shadow(5px 6px 0 rgba(0,0,0,.3))}
.mini-frame{position:absolute;top:32.6%;left:30.8%;width:38.5%;background:transparent;border:none;border-radius:0;padding:0}
.mini-screen{width:100%;aspect-ratio:0.965;border:none;border-radius:2px;position:relative;overflow:hidden;display:flex;flex-direction:column;animation:flicker 3s ease-in-out infinite;will-change:opacity}
.mini-hud{display:flex;justify-content:space-between;padding:2px 3px;font-family:var(--f-pixel);font-size:4px}
.mini-avatar{flex:1;display:flex;justify-content:center;align-items:center;padding-bottom:2px;overflow:visible}
.mini-avatar svg{display:block;max-width:100%;max-height:100%;width:auto;height:auto}
.mini-status{position:absolute;bottom:2px;left:0;right:0;text-align:center;font-family:var(--f-pixel);font-size:4px;color:var(--black);transition:opacity .3s}
.mini-btns{position:absolute;bottom:13%;left:0;right:0;display:flex;justify-content:center;gap:5px;margin:0;padding:0}
.mini-btn-dot{width:12px;height:12px;border-radius:50%;background:transparent;border:none;box-shadow:none;cursor:pointer;transition:all .1s}
.mini-btn-dot:active{transform:translate(1px,1px)}
.mini-btn-dot:nth-child(2){margin-top:2px}

/* ===== MARQUEE ===== */
.marquee-wrap{overflow:hidden;background:var(--white);padding:2rem 0 .5rem;position:relative;z-index:1;margin-top:0;border-radius:0}
.marquee-track{display:flex;animation:marquee 28s linear infinite;will-change:transform;-webkit-backface-visibility:hidden;backface-visibility:hidden}
.marquee-track:hover{animation-play-state:paused}
.marquee-card{flex-shrink:0;border:none;margin:0 1rem;position:relative;overflow:hidden;border-radius:0;transition:transform .35s cubic-bezier(.34,1.56,.64,1)}
.marquee-card:hover{transform:translateY(-6px) scale(1.03)}

/* ===== WORK / PROJECTS ===== */
.work-sec{background:var(--white);padding:2.5rem 1.75rem 5rem;position:relative}
.work-sec::before{content:'';position:absolute;top:0;right:0;width:50%;height:50%;background:radial-gradient(ellipse at top right,rgba(155,240,225,.08),transparent 70%);pointer-events:none;z-index:0}
@media(min-width:768px){.work-sec{padding:2.5rem 2.5rem 5rem}}
.filter-bar{display:flex;flex-wrap:wrap;gap:.7rem;margin-bottom:3.5rem}
.filter-btn{font-family:var(--f-body);text-transform:lowercase;font-weight:400;font-size:.88rem;letter-spacing:-.01em;border:1.5px solid rgba(0,0,0,.15);border-radius:99px;padding:11px 26px;cursor:pointer;transition:all .3s cubic-bezier(.34,1.56,.64,1);color:var(--black)}
.filter-btn:hover{transform:translateY(-3px);background:rgba(0,0,0,.04);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.filter-btn.on{background:var(--black);border-color:var(--black);color:var(--white);box-shadow:0 2px 8px rgba(25,20,20,.15)}

.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:2.5rem 2rem}
@media(min-width:1200px){.proj-grid{grid-template-columns:repeat(3,1fr)}}

.wcard{cursor:pointer;opacity:0;transform:translateY(30px);transition:opacity .6s cubic-bezier(.22,1,.36,1),transform .6s cubic-bezier(.22,1,.36,1)}
.wcard.vis{opacity:1;transform:none}
.wcard-img{position:relative;aspect-ratio:16/10;border:2px solid var(--black);border-radius:4px;overflow:hidden;margin-bottom:1rem;transition:transform .45s cubic-bezier(.34,1.56,.64,1),box-shadow .45s}
.wcard:hover .wcard-img{transform:translateY(-6px) scale(1.01);box-shadow:0 12px 32px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.06)}
.wcard-img .label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--f-pixel);font-size:1.1rem;opacity:.25}
.pxflicker{position:absolute;inset:0;pointer-events:none;z-index:10;opacity:0;
  background-image:
    linear-gradient(45deg,var(--black)25%,transparent 25%,transparent 75%,var(--black)75%),
    linear-gradient(45deg,var(--black)25%,transparent 25%,transparent 75%,var(--black)75%);
  background-size:8px 8px;background-position:0 0,4px 4px;transition:opacity .25s}
.wcard:hover .pxflicker{animation:pxRevealHover .7s steps(6) forwards}
@keyframes pxRevealHover{0%{opacity:.85;background-size:40px 40px}15%{opacity:.7;background-size:24px 24px}30%{opacity:.5;background-size:16px 16px}50%{opacity:.35;background-size:8px 8px}75%{opacity:.15;background-size:4px 4px}100%{opacity:0;background-size:2px 2px}}
.wcard-meta{display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem}
.wcard-name{font-family:var(--f-title);font-size:1.15rem;font-weight:700;line-height:1.2;letter-spacing:-.02em;transition:color .3s}
.wcard:hover .wcard-name{color:var(--blue)}
.wcard-tag{font-family:var(--f-body);font-size:.49rem;font-weight:500;border:1px solid rgba(0,0,0,.2);border-radius:99px;padding:3px 8px;white-space:nowrap;flex-shrink:0;letter-spacing:-.01em}

/* ===== ALLIANCES ===== */
.alliances-sec{padding:5rem 1.75rem;background:var(--blue);position:relative;overflow:hidden}
.alliances-title{font-family:var(--f-title);font-size:clamp(3.5rem,8vw,6rem);text-align:center;letter-spacing:-.03em;margin-bottom:3rem;
  -webkit-text-stroke:2px var(--black);paint-order:stroke fill;color:var(--citric)}
.alliances-box{width:100%;max-width:100%;margin:0;border-radius:8px;overflow:hidden;display:flex;align-items:flex-start;justify-content:flex-start;opacity:0;transform:translateY(30px) scale(.97);filter:blur(2px);transition:opacity 1s cubic-bezier(.22,1,.36,1),transform 1s cubic-bezier(.22,1,.36,1),filter .8s cubic-bezier(.22,1,.36,1);transition-delay:.3s}
.alliances-box.vis{opacity:1;transform:none;filter:blur(0);animation:logoFloat 4s ease-in-out infinite 1.5s}
@keyframes logoFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.alliances-box img{width:100%;height:auto;display:block;transition:transform .5s cubic-bezier(.34,1.56,.64,1)}
.alliances-box:hover img{transform:scale(1.03)}

/* ===== EXPERIENCE (compact combined) ===== */
.exp-sec{padding:5rem 1.75rem;background:var(--fushia);color:var(--white);position:relative;overflow:hidden}
.exp-layout{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:4rem}
@media(max-width:900px){.exp-layout{grid-template-columns:1fr;gap:3rem}}

/* Left column: skills + strengths */
.exp-left-title{font-family:var(--f-title);font-size:clamp(3.5rem,8vw,6rem);font-weight:700;margin-bottom:2rem;color:var(--white);letter-spacing:-.02em;text-align:center}
.exp-sub-title{font-family:var(--f-title);font-size:clamp(1.5rem,2.5vw,2rem);font-weight:700;margin-bottom:1.5rem;color:var(--white);letter-spacing:-.02em}
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(48px,1fr));gap:16px 20px;margin-bottom:3rem}
@media(max-width:500px){.tools-grid{gap:14px 16px}}
.tool-item{display:flex;flex-direction:column;align-items:center;gap:6px;transition:transform .3s cubic-bezier(.34,1.56,.64,1);width:48px}
.tool-item:hover{transform:translateY(-4px) scale(1.08)}
.tool-icon{width:48px;height:48px;border-radius:10px;background:rgba(0,0,0,.15);border:1px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;transition:background .3s,border-color .3s}
.tool-item:hover .tool-icon{background:rgba(0,0,0,.25);border-color:rgba(255,255,255,.35)}
.tool-label{font-family:var(--f-body);font-size:.6rem;color:rgba(255,255,255,.7);text-align:center;letter-spacing:.02em;font-weight:600}
.strengths-grid{display:flex;flex-wrap:wrap;gap:10px}
.strength-tag{font-family:var(--f-body);font-weight:500;font-size:.8rem;padding:8px 20px;border-radius:99px;background:rgba(0,0,0,.1);border:1px solid rgba(255,255,255,.15);color:var(--white);letter-spacing:-.01em;transition:all .3s cubic-bezier(.34,1.56,.64,1)}
.strength-tag:hover{background:var(--black);border-color:var(--black);color:var(--white) !important;transform:translateY(-3px);box-shadow:0 4px 12px rgba(0,0,0,.2)}

/* Right column: compact timeline */
.exp-timeline{position:relative;padding-left:2rem}
.exp-timeline::before{content:'';position:absolute;left:5px;top:0;bottom:0;width:1px;background:rgba(0,0,0,.15)}
.exp-row{position:relative;padding-bottom:2rem;padding-left:1rem;transition:transform .3s}
.exp-row:last-child{padding-bottom:0}
.exp-row:hover{transform:translateX(4px)}
.exp-row::before{content:'';position:absolute;left:-2rem;top:6px;width:8px;height:8px;border-radius:50%;background:var(--citric);border:1px solid rgba(0,0,0,.2);z-index:1;transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s}
.exp-row:hover::before{transform:scale(1.5);box-shadow:0 0 8px rgba(205,245,100,.4)}
.exp-row-role{font-family:var(--f-body);font-weight:600;font-size:.85rem;color:var(--white);margin-bottom:2px;letter-spacing:-.01em}
.exp-row-co{font-family:var(--f-title);font-size:clamp(1rem,1.8vw,1.4rem);font-weight:700;color:var(--white);line-height:1.15;margin-bottom:4px;letter-spacing:-.02em}
.exp-row-date{font-family:var(--f-body);font-size:.75rem;font-weight:400;color:rgba(0,0,0,.45);margin-bottom:6px;letter-spacing:.01em}
.exp-row-desc{font-family:var(--f-body);font-size:.85rem;font-weight:400;color:rgba(255,255,255,.85);line-height:1.5;letter-spacing:-.01em}

/* ===== AWARDS ===== */
.awards-sec{padding:5rem 1.75rem;background:var(--black);color:var(--white);font-family:var(--f-body);position:relative;overflow:hidden}
.awards-sec::after{content:'';position:absolute;bottom:-10%;right:-5%;width:50%;height:50%;background:radial-gradient(ellipse,rgba(240,55,165,.08),transparent 60%);pointer-events:none}
.awards-title{font-family:var(--f-title);text-align:center;font-size:clamp(3.5rem,8vw,6rem);letter-spacing:.02em;margin-bottom:3rem;
  text-shadow:3px 3px 0 var(--fushia),-1px -1px 0 var(--blue)}
.aw-hdr{display:grid;grid-template-columns:80px 1fr auto;gap:1rem;padding-bottom:1rem;border-bottom:1px solid rgba(255,255,255,.15);font-size:.75rem;font-weight:500;text-transform:uppercase;letter-spacing:.05em;align-items:center}
.aw-row{display:grid;grid-template-columns:80px 1fr auto;gap:1rem;padding:1.1rem 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:.9rem;align-items:center;transition:background .25s,transform .25s}
.aw-row:hover{background:rgba(255,255,255,.06);transform:translateX(6px);box-shadow:inset 3px 0 0 var(--citric)}
.aw-medals{display:flex;gap:3px;justify-content:flex-end;flex-wrap:wrap;min-width:60px}
@media(max-width:640px){.aw-hdr,.aw-row{grid-template-columns:55px 1fr auto} .aw-hdr{font-size:.65rem} .aw-row{font-size:.8rem}}

/* ===== ABOUT ===== */
.about-sec{padding:5rem 1.75rem;background:var(--tang);position:relative;overflow-x:clip;overflow-y:visible}
.about-grid{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1.3fr 1fr;gap:3rem;align-items:center;padding-left:2rem}
@media(max-width:1100px){.about-grid{padding-left:1rem}}
@media(max-width:900px){.about-grid{grid-template-columns:1fr;padding-left:0}}
.portrait-wrap{position:relative;overflow:visible}
.about-text h2{font-family:var(--f-title);font-size:clamp(2.5rem,5vw,4rem);font-weight:700;letter-spacing:-.02em;line-height:1.2;margin-bottom:2rem}
.about-text p{font-size:1.1rem;font-weight:400;line-height:1.6;margin-bottom:1.2rem;letter-spacing:-.01em}

/* ===== HOBBY TAMAGOTCHI — Rectangular retro device ===== */
.hobby-tama-wrap{position:relative;width:100%;max-width:420px;margin:0 auto}
.hobby-shell{border-radius:24px;background:var(--aqua);border:3px solid rgba(0,0,0,.15);padding:1.2rem 1.2rem .8rem;width:100%;position:relative;box-shadow:8px 8px 0 rgba(0,0,0,.08);display:flex;flex-direction:column;align-items:center;transition:transform .5s cubic-bezier(.34,1.56,.64,1),box-shadow .5s}
.hobby-shell:hover{transform:translateY(-6px);box-shadow:12px 14px 0 rgba(0,0,0,.12)}
.hobby-frame{width:100%;background:transparent;border:none;border-radius:14px;padding:0}
.hobby-screen{width:100%;aspect-ratio:1/.85;border:2px solid rgba(0,0,0,.12);border-radius:10px;position:relative;overflow:hidden;display:flex;flex-direction:column}
.hobby-hud{display:flex;justify-content:space-between;align-items:center;padding:4px 8px;font-family:var(--f-pixel);font-size:.45rem;position:relative;z-index:2;color:var(--black)}
.hobby-hud-dots{display:flex;gap:3px}
.hobby-hud-dots div{width:4px;height:4px;background:var(--black)}
.hobby-avatar-area{flex:1;display:flex;justify-content:center;align-items:center;z-index:2;position:relative;min-height:160px}
.hobby-status{position:absolute;bottom:6px;left:0;right:0;text-align:center;font-family:var(--f-pixel);font-size:.5rem;color:var(--black);z-index:3;transition:all .3s cubic-bezier(.22,1,.36,1)}
.hobby-cta{position:absolute;bottom:28px;left:0;right:0;text-align:center;font-family:var(--f-pixel);font-size:.42rem;color:var(--black);opacity:.5;z-index:3;animation:ctaPulse 2s ease-in-out infinite}
@keyframes ctaPulse{0%,100%{opacity:.4}50%{opacity:.8}}

/* Hobby button grid — embedded in shell body below frame */
.hobby-btn-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px 8px;padding:14px 8px 6px;width:100%}
.hobby-btn{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;border:none;background:none;padding:3px;transition:transform .2s cubic-bezier(.34,1.56,.64,1)}
.hobby-btn:hover{transform:scale(1.15) translateY(-3px)}
.hobby-btn:active{transform:scale(.92)}
.hobby-btn-icon{width:38px;height:38px;border-radius:10px;background:rgba(0,0,0,.06);border:2px solid rgba(0,0,0,.1);box-shadow:1px 1px 0 rgba(0,0,0,.06);display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .25s cubic-bezier(.34,1.56,.64,1)}
.hobby-btn:hover .hobby-btn-icon{background:rgba(0,0,0,.1);border-color:rgba(0,0,0,.2)}
.hobby-btn.active .hobby-btn-icon{border-color:var(--blue);box-shadow:0 0 0 2px var(--blue);background:rgba(65,0,245,.08);transform:scale(1.08)}
.hobby-btn-label{font-family:var(--f-pixel);font-size:5.5px;text-transform:uppercase;color:rgba(0,0,0,.45);white-space:nowrap;letter-spacing:.02em;transition:color .2s}
.hobby-btn.active .hobby-btn-label,.hobby-btn:hover .hobby-btn-label{color:var(--blue)}

/* Device accent details */
.hobby-device-label{font-family:var(--f-pixel);font-size:.4rem;color:rgba(0,0,0,.25);text-align:center;padding:4px 0 0;letter-spacing:.15em;text-transform:uppercase}

/* Pet reactions */
.hobby-pet-shake{animation:hobbyShake .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes hobbyShake{
  0%{transform:scale(1)}
  25%{transform:scale(1.1) rotate(-3deg)}
  50%{transform:scale(1.12) rotate(3deg)}
  75%{transform:scale(1.05) rotate(-1deg)}
  100%{transform:scale(1) rotate(0)}
}
.hobby-pet-bounce{animation:hobbyBounce .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes hobbyBounce{
  0%,100%{transform:translateY(0)}
  30%{transform:translateY(-14px)}
  60%{transform:translateY(-6px)}
}
.hobby-pet-vibrate{animation:hobbyVibrate .5s linear}
@keyframes hobbyVibrate{
  0%,100%{transform:translate(0)}
  10%{transform:translate(-2px,1px)}
  20%{transform:translate(2px,-1px)}
  30%{transform:translate(-1px,2px)}
  40%{transform:translate(1px,-2px)}
  50%{transform:translate(-2px,0)}
  60%{transform:translate(2px,1px)}
  70%{transform:translate(-1px,-1px)}
  80%{transform:translate(1px,2px)}
  90%{transform:translate(-2px,-2px)}
}

/* Photo pop-outs — left side mood-board collage with spring animation */
.hobby-photos{position:absolute;top:-30px;bottom:-30px;right:calc(100% + 20px);width:220px;pointer-events:none;z-index:50}
@media(max-width:1100px){.hobby-photos{right:calc(100% + 14px);width:180px}}
@media(max-width:900px){.hobby-photos{position:relative;right:auto;top:auto;bottom:auto;width:100%;height:auto;min-height:180px;display:flex;gap:12px;justify-content:center;align-items:center;margin-bottom:16px;flex-wrap:wrap}}

.hobby-photo{position:absolute;border:4px solid var(--black);box-shadow:6px 6px 0 var(--black);overflow:hidden;background:var(--white);
  opacity:0;pointer-events:none;
  transition:opacity .5s cubic-bezier(.22,1,.36,1),transform .7s cubic-bezier(.175,.885,.32,1.275)}

/* Photo 1 — larger landscape, top-left area */
.hobby-photo:nth-child(1){width:170px;height:125px;top:5%;left:15px;
  transform:translateX(-70px) translateY(25px) rotate(-14deg) scale(.5)}
.hobby-photo.show:nth-child(1){opacity:1;
  transform:translateX(0) translateY(0) rotate(var(--rot,-5deg)) scale(1);transition-delay:0s}

/* Photo 2 — smaller portrait-ish, bottom area */
.hobby-photo:nth-child(2){width:130px;height:155px;top:48%;left:40px;
  transform:translateX(-50px) translateY(-20px) rotate(10deg) scale(.5)}
.hobby-photo.show:nth-child(2){opacity:1;
  transform:translateX(0) translateY(0) rotate(var(--rot,4deg)) scale(1);transition-delay:.12s}

@media(max-width:900px){
  .hobby-photo{position:relative!important;top:auto!important;left:auto!important;right:auto!important;bottom:auto!important;
    transform:translateY(30px) scale(.6)!important}
  .hobby-photo.show{transform:translateY(0) rotate(var(--rot,0deg)) scale(1)!important}
  .hobby-photo:nth-child(1){width:140px;height:105px}
  .hobby-photo:nth-child(2){width:110px;height:130px}
}
.hobby-photo .photo-inner{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:var(--f-pixel);font-size:7px;color:var(--gray);text-align:center;line-height:1.5;padding:8px 6px}
.hobby-photo .photo-label{position:absolute;bottom:0;left:0;right:0;background:var(--black);color:var(--white);font-family:var(--f-pixel);font-size:5px;text-align:center;padding:3px 2px}

/* About copy transition */
.about-copy-block{transition:opacity .4s cubic-bezier(.22,1,.36,1),transform .4s cubic-bezier(.22,1,.36,1)}
.about-copy-block.hobby-active{opacity:1;transform:none}
.hobby-copy-tag{display:inline-block;font-family:var(--f-body);font-weight:500;font-size:.75rem;text-transform:uppercase;letter-spacing:.03em;padding:5px 12px;border:1px solid rgba(0,0,0,.2);border-radius:99px;margin-bottom:1.2rem;transition:all .3s}
.hobby-copy-desc{font-size:1rem;font-weight:400;line-height:1.6;margin-bottom:1rem;transition:opacity .4s;letter-spacing:-.01em}

/* ===== CONTACT ===== */
.contact-sec{padding:5rem 1.75rem;background:var(--black);color:var(--white);text-align:center;position:relative;overflow:hidden}
.contact-sec::before{content:'';position:absolute;top:-20%;left:50%;transform:translateX(-50%);width:80%;height:60%;background:radial-gradient(ellipse,rgba(65,0,245,.12),transparent 60%);pointer-events:none}
.contact-title{font-family:var(--f-title);font-size:clamp(3.5rem,8vw,6rem);font-weight:700;letter-spacing:.02em;margin-bottom:3rem;
  text-shadow:3px 3px 0 var(--blue),-1px -1px 0 var(--tang)}
.contact-links{display:flex;flex-wrap:wrap;justify-content:center;gap:3rem 4rem}
.contact-icon-link{display:flex;flex-direction:column;align-items:center;gap:1rem;text-decoration:none;color:var(--white);transition:transform .35s cubic-bezier(.34,1.56,.64,1),color .25s}
.contact-icon-link:hover{transform:translateY(-8px) scale(1.05);color:var(--citric)}
.contact-icon-circle{width:64px;height:64px;border:1px solid rgba(255,255,255,.25);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:border-color .25s,background .25s}
.contact-icon-link:hover .contact-icon-circle{border-color:var(--citric);background:rgba(205,245,100,.08);box-shadow:0 0 20px rgba(205,245,100,.15)}
.contact-icon-label{font-family:var(--f-body);font-size:.85rem;font-weight:500;letter-spacing:-.01em}
.contact-footer{margin-top:4rem;padding-top:2rem;border-top:1px solid rgba(255,255,255,.1);font-family:var(--f-body);font-size:.8rem;font-weight:400;color:var(--gray);line-height:1.8;letter-spacing:-.01em;text-transform:none}

/* ===== SECTION DIVIDERS ===== */
.sec-divider{position:relative;z-index:5;pointer-events:none;line-height:0;overflow:hidden;height:clamp(48px,6vw,80px)}
.sec-divider.hero-divider{height:clamp(80px,12vw,160px);margin-top:0;z-index:3}
.sec-divider canvas{display:block;width:100%;height:100%}


/* ===== SCROLL PROGRESS BAR ===== */
.scroll-progress{display:none}

/* ===== HERO ENTRANCE ===== */
.hero-enter{opacity:0;transform:translateY(16px)}
.hero-enter.go{opacity:1;transform:none;transition:opacity .8s cubic-bezier(.22,1,.36,1),transform .8s cubic-bezier(.22,1,.36,1)}
.hero-enter.d1{transition-delay:.1s}
.hero-enter.d2{transition-delay:.45s}
.hero-enter.d3{transition-delay:.85s}
.hero-enter.d4{transition-delay:1.1s}

/* ===== SECTION REVEALS ===== */
.reveal{opacity:0;transform:translateY(28px);transition:opacity .8s cubic-bezier(.22,1,.36,1),transform .8s cubic-bezier(.22,1,.36,1)}
.reveal.vis{opacity:1;transform:none}

.reveal-left{opacity:0;transform:translateX(-32px);transition:opacity .8s cubic-bezier(.22,1,.36,1),transform .8s cubic-bezier(.22,1,.36,1)}
.reveal-left.vis{opacity:1;transform:none}

.reveal-right{opacity:0;transform:translateX(32px);transition:opacity .8s cubic-bezier(.22,1,.36,1),transform .8s cubic-bezier(.22,1,.36,1)}
.reveal-right.vis{opacity:1;transform:none}

.reveal-scale{opacity:0;transform:scale(.96);transition:opacity .7s cubic-bezier(.22,1,.36,1),transform .7s cubic-bezier(.22,1,.36,1)}
.reveal-scale.vis{opacity:1;transform:none}

/* ===== STAGGER CHILDREN ===== */
.stagger-item{opacity:0;transform:translateY(16px);transition:opacity .6s cubic-bezier(.22,1,.36,1),transform .6s cubic-bezier(.22,1,.36,1)}
.stagger-item.vis{opacity:1;transform:none}

/* --- Tool icons: smooth pop-in with bounce --- */
.tool-pop{opacity:0;transform:scale(.4) translateY(12px);transition:opacity .45s cubic-bezier(.22,1,.36,1),transform .6s cubic-bezier(.34,1.56,.64,1)}
.tool-pop.vis{opacity:1;transform:scale(1) translateY(0)}

/* --- Experience rows: smooth slide from left --- */
.exp-row.stagger-item{transform:translateX(-40px) scale(.96);opacity:0;filter:blur(4px);transition:opacity .7s cubic-bezier(.22,1,.36,1),transform .8s cubic-bezier(.34,1.56,.64,1),filter .6s cubic-bezier(.22,1,.36,1)}
.exp-row.stagger-item.vis{opacity:1;transform:translateX(0) scale(1);filter:blur(0)}

/* --- Award rows: smooth slide from right --- */
.aw-row.stagger-item{transform:translateX(16px);opacity:0;transition:opacity .5s cubic-bezier(.22,1,.36,1),transform .55s cubic-bezier(.22,1,.36,1)}
.aw-row.stagger-item.vis{opacity:1;transform:translateX(0)}

/* --- About Tamagotchi: drop-in with smooth bounce --- */
@keyframes tamaDropIn{
  0%  {opacity:0;transform:translateY(-100vh) scale(.85) rotate(-3deg)}
  35% {opacity:1;transform:translateY(12px) scale(1.04) rotate(1deg)}
  50% {transform:translateY(-20px) scale(.97) rotate(-0.5deg)}
  65% {transform:translateY(6px) scale(1.02) rotate(0.3deg)}
  80% {transform:translateY(-3px) scale(.99) rotate(0deg)}
  100%{opacity:1;transform:translateY(0) scale(1) rotate(0deg)}
}
.tama-drop-in{opacity:0}
.tama-drop-in.vis{animation:tamaDropIn 1.2s cubic-bezier(.22,1,.36,1) forwards}

/* ===== MIXED FONT TITLE ===== */
.mixed-title{display:inline;cursor:default}
.mixed-char{display:inline-block;transition:font-family .35s cubic-bezier(.22,1,.36,1),font-style .35s,font-weight .35s,transform .3s cubic-bezier(.34,1.56,.64,1),letter-spacing .3s;will-change:transform;position:relative;cursor:default}
.mixed-char:hover{transform:translateY(-5px) scale(1.08)}
.mixed-char.f-serif{font-family:'Antic Didone',serif !important;font-style:normal !important;font-weight:400 !important}
.mixed-char.f-italic{font-family:'Libre Bodoni',serif !important;font-style:italic !important;font-weight:700 !important}
.mixed-char.f-pixel{font-family:'DotGothic16',cursive !important;font-style:normal !important;font-weight:400 !important}
.mixed-char.f-space{width:.25em}

/* ===== GLITCH-IN TEXT (subtle 2-frame flicker then settle) ===== */
.glitch-in{position:relative;opacity:0;transform:translateY(12px);transition:opacity .7s cubic-bezier(.22,1,.36,1),transform .7s cubic-bezier(.22,1,.36,1)}
.glitch-in.vis{opacity:1;transform:none;animation:subtleGlitch .3s steps(2) .15s both}
@keyframes subtleGlitch{
  0%{text-shadow:2px 0 var(--tang),-2px 0 var(--blue)}
  50%{text-shadow:-1px 0 var(--fushia),1px 0 var(--citric)}
  100%{text-shadow:none}
}

/* ===== SECTION DIVIDER — 16-bit pixel block transition ===== */
.section-divider{width:100%;position:relative;overflow:hidden;background:var(--black);height:48px;image-rendering:pixelated}
.section-divider::before,.section-divider::after{content:'';position:absolute;left:0;right:0;height:24px;image-rendering:pixelated}
.section-divider::before{top:0;
  background:
    repeating-linear-gradient(90deg,var(--citric) 0 12px,transparent 12px 24px),
    repeating-linear-gradient(90deg,transparent 0 12px,var(--tang) 12px 24px);
  background-size:48px 12px;background-position:0 0,0 12px;
  animation:divMarch 4s linear infinite}
.section-divider::after{bottom:0;
  background:
    repeating-linear-gradient(90deg,var(--fushia) 0 8px,transparent 8px 16px,var(--blue) 16px 24px,transparent 24px 32px),
    repeating-linear-gradient(90deg,transparent 0 8px,var(--aqua) 8px 16px,transparent 16px 24px,var(--citric) 24px 32px);
  background-size:64px 12px;background-position:0 0,0 12px;
  animation:divMarch 6s linear infinite reverse}
@keyframes divMarch{0%{transform:translateX(0)}100%{transform:translateX(-48px)}}
.section-divider.blue::before{background:repeating-linear-gradient(90deg,var(--blue) 0 12px,transparent 12px 24px),repeating-linear-gradient(90deg,transparent 0 12px,var(--fushia) 12px 24px);background-size:48px 12px;background-position:0 0,0 12px}
.section-divider.blue::after{background:repeating-linear-gradient(90deg,var(--citric) 0 8px,transparent 8px 16px,var(--tang) 16px 24px,transparent 24px 32px),repeating-linear-gradient(90deg,transparent 0 8px,var(--blue) 8px 16px,transparent 16px 24px,var(--aqua) 24px 32px);background-size:64px 12px;background-position:0 0,0 12px}
.section-divider.aqua::before{background:repeating-linear-gradient(90deg,var(--aqua) 0 12px,transparent 12px 24px),repeating-linear-gradient(90deg,transparent 0 12px,var(--citric) 12px 24px);background-size:48px 12px;background-position:0 0,0 12px}
.section-divider.aqua::after{background:repeating-linear-gradient(90deg,var(--fushia) 0 8px,transparent 8px 16px,var(--blue) 16px 24px,transparent 24px 32px),repeating-linear-gradient(90deg,transparent 0 8px,var(--citric) 8px 16px,transparent 16px 24px,var(--tang) 24px 32px);background-size:64px 12px;background-position:0 0,0 12px}
.section-divider.tang::before{background:repeating-linear-gradient(90deg,var(--tang) 0 12px,transparent 12px 24px),repeating-linear-gradient(90deg,transparent 0 12px,var(--blue) 12px 24px);background-size:48px 12px;background-position:0 0,0 12px}
.section-divider.tang::after{background:repeating-linear-gradient(90deg,var(--citric) 0 8px,transparent 8px 16px,var(--fushia) 16px 24px,transparent 24px 32px),repeating-linear-gradient(90deg,transparent 0 8px,var(--tang) 8px 16px,transparent 16px 24px,var(--blue) 24px 32px);background-size:64px 12px;background-position:0 0,0 12px}

/* Pixel dissolve edge on dividers */
.section-divider .px-edge-top,.section-divider .px-edge-bot{position:absolute;left:0;right:0;height:12px;image-rendering:pixelated;z-index:2}
.section-divider .px-edge-top{top:-12px;background:linear-gradient(180deg,transparent 0%,var(--black) 100%);mask-image:url("data:image/svg+xml,%3Csvg width='48' height='12' xmlns='http://www.w3.org/2000/svg'%3E%3Crect x='0' y='8' width='8' height='4' fill='black'/%3E%3Crect x='8' y='4' width='8' height='8' fill='black'/%3E%3Crect x='16' y='8' width='8' height='4' fill='black'/%3E%3Crect x='24' y='0' width='8' height='12' fill='black'/%3E%3Crect x='32' y='4' width='8' height='8' fill='black'/%3E%3Crect x='40' y='8' width='8' height='4' fill='black'/%3E%3C/svg%3E");mask-size:48px 12px;mask-repeat:repeat-x;-webkit-mask-image:url("data:image/svg+xml,%3Csvg width='48' height='12' xmlns='http://www.w3.org/2000/svg'%3E%3Crect x='0' y='8' width='8' height='4' fill='black'/%3E%3Crect x='8' y='4' width='8' height='8' fill='black'/%3E%3Crect x='16' y='8' width='8' height='4' fill='black'/%3E%3Crect x='24' y='0' width='8' height='12' fill='black'/%3E%3Crect x='32' y='4' width='8' height='8' fill='black'/%3E%3Crect x='40' y='8' width='8' height='4' fill='black'/%3E%3C/svg%3E");-webkit-mask-size:48px 12px;-webkit-mask-repeat:repeat-x}
.section-divider .px-edge-bot{bottom:-12px;background:linear-gradient(0deg,transparent 0%,var(--black) 100%);mask-image:url("data:image/svg+xml,%3Csvg width='48' height='12' xmlns='http://www.w3.org/2000/svg'%3E%3Crect x='0' y='0' width='8' height='4' fill='black'/%3E%3Crect x='8' y='0' width='8' height='8' fill='black'/%3E%3Crect x='16' y='0' width='8' height='4' fill='black'/%3E%3Crect x='24' y='0' width='8' height='12' fill='black'/%3E%3Crect x='32' y='0' width='8' height='8' fill='black'/%3E%3Crect x='40' y='0' width='8' height='4' fill='black'/%3E%3C/svg%3E");mask-size:48px 12px;mask-repeat:repeat-x;-webkit-mask-image:url("data:image/svg+xml,%3Csvg width='48' height='12' xmlns='http://www.w3.org/2000/svg'%3E%3Crect x='0' y='0' width='8' height='4' fill='black'/%3E%3Crect x='8' y='0' width='8' height='8' fill='black'/%3E%3Crect x='16' y='0' width='8' height='4' fill='black'/%3E%3Crect x='24' y='0' width='8' height='12' fill='black'/%3E%3Crect x='32' y='0' width='8' height='8' fill='black'/%3E%3Crect x='40' y='0' width='8' height='4' fill='black'/%3E%3C/svg%3E");-webkit-mask-size:48px 12px;-webkit-mask-repeat:repeat-x}

/* ===== PIXEL FRAME BORDERS — modern pixel-art photo treatment ===== */
.pixel-frame{position:relative;display:inline-block}
.pixel-frame::before,.pixel-frame::after{content:'';position:absolute;pointer-events:none;image-rendering:pixelated;z-index:5}
.pixel-frame::before{top:-6px;left:-6px;right:-6px;bottom:-6px;border:4px solid var(--black);
  box-shadow:inset 4px 4px 0 var(--citric),inset -4px -4px 0 var(--fushia),8px 8px 0 var(--black)}
.pixel-frame::after{top:-12px;left:-12px;width:16px;height:16px;
  background:var(--tang);border:3px solid var(--black)}
.pixel-frame.blue::before{box-shadow:inset 4px 4px 0 var(--blue),inset -4px -4px 0 var(--aqua),8px 8px 0 var(--black)}
.pixel-frame.blue::after{background:var(--blue)}

/* ===== PIXEL CORNER DECORATIONS ===== */
.px-corners{position:relative}
.px-corners::before,.px-corners::after{content:'';position:absolute;width:12px;height:12px;border:3px solid var(--black);z-index:5;pointer-events:none}
.px-corners::before{top:-4px;left:-4px;background:var(--citric)}
.px-corners::after{bottom:-4px;right:-4px;background:var(--fushia)}

/* ===== SECTION LABEL — modern pixel tag ===== */
.section-label{display:inline-flex;align-items:center;gap:8px;font-family:var(--f-body);font-weight:700;font-size:.75rem;text-transform:uppercase;letter-spacing:.12em;
  background:var(--black);color:var(--white);padding:8px 20px;margin-bottom:2rem;position:relative}
.section-label::before{content:'';display:inline-block;width:8px;height:8px;background:var(--citric);flex-shrink:0}
.section-label::after{content:'';position:absolute;top:4px;left:4px;right:-4px;bottom:-4px;border:2px solid var(--black);z-index:-1}
.section-label.fushia{background:var(--fushia)}.section-label.fushia::before{background:var(--white)}
.section-label.blue{background:var(--blue)}.section-label.blue::before{background:var(--citric)}
.section-label.tang{background:var(--tang)}.section-label.tang::before{background:var(--white)}

/* ===== PIXEL DITHER OVERLAY for sections ===== */
.dither-overlay{position:relative}
.dither-overlay::after{content:'';position:absolute;inset:0;pointer-events:none;opacity:.04;z-index:1;
  background-image:url("data:image/svg+xml,%3Csvg width='4' height='4' xmlns='http://www.w3.org/2000/svg'%3E%3Crect x='0' y='0' width='2' height='2' fill='%23191414'/%3E%3Crect x='2' y='2' width='2' height='2' fill='%23191414'/%3E%3C/svg%3E");
  background-size:4px 4px;image-rendering:pixelated}

/* ===== PIXEL WIPE OVERLAY (very subtle) ===== */
.px-wipe-wrap{position:relative}
.px-wipe-wrap::before{
  content:'';position:absolute;inset:0;z-index:20;pointer-events:none;
  background-image:
    linear-gradient(45deg,var(--black) 25%,transparent 25%,transparent 75%,var(--black) 75%),
    linear-gradient(45deg,var(--black) 25%,transparent 25%,transparent 75%,var(--black) 75%);
  background-size:4px 4px;background-position:0 0,2px 2px;
  opacity:0;image-rendering:pixelated;
}
.px-wipe-wrap.wiping::before{animation:pxDissolveIn .4s ease-out forwards}
@keyframes pxDissolveIn{
  0%  {opacity:.2}
  100%{opacity:0}
}

/* ===== IMAGE LOADER GRID EFFECT ===== */
.img-loader-wrap{position:relative;overflow:hidden;width:100%;height:100%}
.img-loader-canvas{position:absolute;inset:0;width:100%;height:100%;image-rendering:pixelated;z-index:2;transition:opacity .4s ease}
.img-loader-canvas.done{opacity:0}
.img-loader-wrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .4s ease}
.img-loader-wrap img.visible{opacity:1}

/* ===== POINT COUNTER ===== */
.pts-counter{font-variant-numeric:tabular-nums}

/* ===== PARALLAX HELPERS ===== */
.parallax-slow{transition:transform .1s linear}

/* ===== FILTER BTN STAGGER ===== */
.filter-btn{opacity:0;transform:translateY(8px);transition:opacity .45s cubic-bezier(.22,1,.36,1),transform .45s cubic-bezier(.22,1,.36,1),background .25s,color .25s,box-shadow .25s}
.filter-btn.entered{opacity:1;transform:none}

/* ===== CONTACT LINK STAGGER ===== */
.contact-link-anim{opacity:0;transform:translateY(12px);transition:opacity .55s cubic-bezier(.22,1,.36,1),transform .55s cubic-bezier(.22,1,.36,1),color .2s}
.contact-link-anim.vis{opacity:1;transform:none}
.contact-link-anim:hover{color:var(--citric) !important;transform:translateY(-2px) !important}

/* ===== WORK CARD ===== */
.wcard{cursor:pointer;opacity:0;transform:translateY(12px);transition:opacity .6s cubic-bezier(.22,1,.36,1),transform .6s cubic-bezier(.22,1,.36,1)}
.wcard.vis{opacity:1;transform:none}
.wcard-client{font-family:var(--f-body);font-weight:600;font-size:.75rem;color:var(--gray);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}

/* ===== IMAGE REVEAL ===== */
.pixel-reveal-wrap{position:relative;overflow:hidden}
.pixel-reveal-wrap img{transition:opacity .6s cubic-bezier(.22,1,.36,1)}
.pixel-reveal-wrap.loading img{opacity:0}
.pixel-reveal-wrap.revealing img{opacity:1}

/* ===== PROJECT DETAIL MODAL ===== */
.proj-overlay{position:fixed;inset:0;z-index:10000;background:rgba(25,20,20,.85);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .35s cubic-bezier(.22,1,.36,1)}
.proj-overlay.open{opacity:1;pointer-events:auto}
.proj-modal{background:var(--white);border:1px solid rgba(0,0,0,.1);border-radius:8px;box-shadow:0 16px 48px rgba(0,0,0,.15);max-width:1100px;width:92vw;max-height:85vh;overflow-y:auto;position:relative;transform:translateY(30px) scale(.96);transition:transform .4s cubic-bezier(.34,1.56,.64,1);padding:0}
.proj-overlay.open .proj-modal{transform:none}
.proj-modal-close{position:absolute;top:12px;right:12px;z-index:10;width:36px;height:36px;background:rgba(0,0,0,.6);color:var(--white);border:1px solid rgba(255,255,255,.2);border-radius:50%;font-family:var(--f-body);font-size:1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s;backdrop-filter:blur(4px)}
.proj-modal-close:hover{background:var(--tang);color:var(--white)}
.proj-modal-hero{width:100%;aspect-ratio:16/9;position:relative;overflow:hidden;border-bottom:1px solid rgba(0,0,0,.08)}
.proj-modal-hero img{width:100%;height:100%;object-fit:cover}
.proj-modal-hero .placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:var(--f-pixel);font-size:1rem;opacity:.3}
.proj-modal-body{padding:2rem 2.5rem 2.5rem}
@media(max-width:640px){.proj-modal-body{padding:1.5rem 1.2rem}}
.proj-modal-client{font-family:var(--f-body);font-weight:600;font-size:.8rem;color:var(--gray);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.5rem}
.proj-modal-title{font-family:var(--f-title);font-size:clamp(2.2rem,5vw,3.5rem);font-weight:700;line-height:1.15;margin-bottom:1.5rem;letter-spacing:-.02em}
.proj-modal-section{margin-bottom:1.5rem}
.proj-modal-label{font-family:var(--f-body);font-weight:700;font-size:.75rem;color:var(--blue);text-transform:uppercase;letter-spacing:.12em;margin-bottom:.6rem}
.proj-modal-text{font-size:1rem;font-weight:400;line-height:1.6;white-space:pre-line;letter-spacing:-.01em}
.proj-modal-gallery{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;margin-bottom:1.5rem}
.proj-modal-gallery.single-col{grid-template-columns:1fr}
.proj-modal-gallery.three-col{grid-template-columns:repeat(3,1fr)}
@media(max-width:768px){.proj-modal-gallery.three-col{grid-template-columns:1fr}.proj-modal-gallery{gap:.6rem}}
.proj-modal-gallery.bento-grid{display:grid;grid-template-columns:3fr 2fr 2.8fr;grid-template-rows:1fr 1fr;gap:.6rem;aspect-ratio:16/9}
.proj-modal-gallery.bento-grid>div{overflow:hidden;border-radius:4px;border:2px solid rgba(255,255,255,.1);opacity:0;transform:translateY(20px) scale(.95);animation:bentoIn .6s cubic-bezier(.22,1,.36,1) forwards}
.proj-modal-gallery.bento-grid .bento-01{animation-delay:.1s}
.proj-modal-gallery.bento-grid .bento-02{animation-delay:0s}
.proj-modal-gallery.bento-grid .bento-03{animation-delay:.15s}
.proj-modal-gallery.bento-grid .bento-04{animation-delay:.25s}
.proj-modal-gallery.bento-grid .bento-05{animation-delay:.35s}
.proj-modal-gallery.bento-grid>div img{transition:transform .5s cubic-bezier(.34,1.56,.64,1),filter .4s}
.proj-modal-gallery.bento-grid>div:hover img{transform:scale(1.05);filter:brightness(1.05)}
@keyframes bentoIn{0%{opacity:0;transform:translateY(20px) scale(.95)}100%{opacity:1;transform:translateY(0) scale(1)}}
.proj-modal-gallery.bento-grid>div img{width:100%;height:100%;object-fit:cover;display:block;border:none;border-radius:0}
.proj-modal-gallery.bento-grid .bento-01{grid-column:3;grid-row:1/3}
.proj-modal-gallery.bento-grid .bento-02{grid-column:1;grid-row:1}
.proj-modal-gallery.bento-grid .bento-03{grid-column:2;grid-row:1}
.proj-modal-gallery.bento-grid .bento-04{grid-column:1;grid-row:2}
.proj-modal-gallery.bento-grid .bento-05{grid-column:2;grid-row:2}
@media(max-width:768px){.proj-modal-gallery.bento-grid{grid-template-columns:1fr 1fr;grid-template-rows:auto auto auto;aspect-ratio:auto}.proj-modal-gallery.bento-grid .bento-01{grid-column:1/-1;grid-row:1}.proj-modal-gallery.bento-grid .bento-02{grid-column:1;grid-row:2}.proj-modal-gallery.bento-grid .bento-03{grid-column:2;grid-row:2}.proj-modal-gallery.bento-grid .bento-04{grid-column:1;grid-row:3}.proj-modal-gallery.bento-grid .bento-05{grid-column:2;grid-row:3}}
.proj-modal-gallery img{width:100%;border:1px solid rgba(0,0,0,.08);border-radius:4px;transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.proj-modal-gallery img:hover{transform:translateY(-3px)}
.proj-modal-gallery .gallery-full{grid-column:1/-1}

/* ===== GROUP LAYOUTS ===== */
.group-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem}
.group-row img{width:100%;height:100%;object-fit:cover;border:1px solid rgba(0,0,0,.08);border-radius:4px;transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.group-row img:hover{transform:translateY(-3px)}
.group-row-full{grid-template-columns:1fr}
.group-row-full img{object-fit:contain}
@media(max-width:768px){.group-row{grid-template-columns:repeat(2,1fr);gap:.6rem}.group-row-full{grid-template-columns:1fr}}

/* Collage — sketchbook scattered photos */
.group-collage{position:relative;min-height:800px;margin-bottom:2rem;border-radius:8px;padding:2rem;overflow:visible}
.group-collage .collage-item{position:absolute;overflow:visible;cursor:pointer;transition:transform .35s cubic-bezier(.34,1.56,.64,1),box-shadow .3s ease,z-index 0s}
.group-collage .collage-item::before{content:'';position:absolute;top:-9px;left:50%;transform:translateX(-50%) rotate(var(--tape-rot,0deg));width:32px;height:14px;background:rgba(255,255,200,.5);border:1px solid rgba(0,0,0,.08);z-index:3;border-radius:1px}
.group-collage .collage-item:nth-child(odd)::before{--tape-rot:3deg}
.group-collage .collage-item:nth-child(3n)::before{--tape-rot:-5deg;left:30%}
.group-collage .collage-item:nth-child(5n)::before{left:65%}
.group-collage .collage-item:hover{z-index:30 !important;transform:scale(1.12) rotate(0deg) !important;box-shadow:8px 14px 28px rgba(0,0,0,.4)}
.group-collage .collage-item img{width:100%;height:auto;object-fit:contain;display:block;border:5px solid #fff;box-shadow:2px 3px 14px rgba(0,0,0,.3);background:#fff;padding:3px}
@media(max-width:768px){.group-collage{min-height:550px;padding:1rem}}

/* Collage drop-in animation — photos falling onto desk */
.group-collage .collage-item{opacity:0}
.group-collage.anim-in .collage-item{animation:sketchDrop .8s cubic-bezier(.22,1,.36,1) forwards}
@keyframes sketchDrop{
  0%{opacity:0;transform:translateY(-120px) rotate(calc(var(--end-rot,0deg) + 18deg)) scale(.6)}
  50%{opacity:1;transform:translateY(8px) rotate(calc(var(--end-rot,0deg) - 5deg)) scale(1.04)}
  70%{transform:translateY(-4px) rotate(calc(var(--end-rot,0deg) + 2deg)) scale(.98)}
  85%{transform:translateY(2px) rotate(calc(var(--end-rot,0deg) - 1deg)) scale(1.01)}
  100%{opacity:1;transform:translateY(0) rotate(var(--end-rot,0deg)) scale(1)}
}
.proj-modal-videos{display:flex;flex-wrap:wrap;gap:.6rem}
.proj-modal-video-embeds{display:flex;flex-direction:column;gap:1.5rem}
.proj-modal-embed{position:relative;width:100%;padding-bottom:56.25%;border:1px solid rgba(0,0,0,.08);border-radius:4px;overflow:hidden;background:var(--black)}
/* Vertical (9:16) video in phone frame */
.proj-modal-vertical-videos{display:flex;flex-wrap:wrap;gap:2rem;justify-content:center}
.phone-frame{width:240px;background:var(--black);border-radius:28px;padding:10px 7px;box-shadow:0 4px 16px rgba(0,0,0,.2);position:relative}
.phone-frame::before{content:'';display:block;width:60px;height:6px;background:rgba(255,255,255,.15);border-radius:3px;margin:0 auto 8px}
.phone-screen{width:100%;aspect-ratio:9/16;border-radius:20px;overflow:hidden;position:relative;background:var(--black)}
.phone-screen iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0}
.phone-frame::after{content:'';display:block;width:40px;height:40px;border:3px solid rgba(255,255,255,.12);border-radius:50%;margin:8px auto 4px}

/* ===== INSTAGRAM STORY VIEWER ===== */
.story-strip{position:relative;width:100%;overflow:visible;padding:1rem 0}
.story-strip-inner{display:flex;align-items:center;justify-content:center;gap:12px;position:relative}
.story-card{flex:0 0 auto;width:18%;aspect-ratio:9/16;border-radius:12px;overflow:hidden;position:relative;transition:transform .5s cubic-bezier(.4,0,.2,1),opacity .5s,filter .5s}
.story-card img{width:100%;height:100%;object-fit:cover;display:block}
.story-card.dimmed{opacity:.45;filter:grayscale(.3) blur(1px);transform:scale(.92)}
.story-card.active{opacity:1;filter:none;transform:scale(1)}
.story-frame-wrap{flex:0 0 auto;width:18%;position:relative}
.story-frame-inner{position:relative;width:100%;aspect-ratio:477/984;border-radius:12px;overflow:hidden}
.story-frame-inner .sf-images{position:absolute;inset:0;display:flex;transition:transform .6s cubic-bezier(.4,0,.2,1)}
.story-frame-inner .sf-images img{min-width:100%;width:100%;height:100%;object-fit:cover;flex-shrink:0}
.story-frame-overlay{position:absolute;inset:0;z-index:10;pointer-events:none}
.story-frame-overlay img{width:100%;height:100%;object-fit:fill}
.story-progress{position:absolute;top:6px;left:6px;right:6px;display:flex;gap:2px;z-index:15}
.story-progress-bar{flex:1;height:2px;background:rgba(255,255,255,.3);border-radius:2px;overflow:hidden}
.story-progress-fill{height:100%;background:#fff;border-radius:2px}
.story-progress-bar.done .story-progress-fill{width:100%}
@media(max-width:768px){.story-card{width:22%}.story-frame-wrap{width:22%}.story-strip-inner{gap:6px}}

/* ===== TAMA REACTIONS (unique per nav button) ===== */
.tama-reacting .tama-shell,.tama-reacting .mini-shell{animation:tamaExcited .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes tamaExcited{
  0%{transform:scale(1)}
  25%{transform:scale(1.06) rotate(-2deg)}
  50%{transform:scale(1.08) rotate(2deg)}
  75%{transform:scale(1.04) rotate(-1deg)}
  100%{transform:scale(1) rotate(0)}
}
/* Jump reaction for WORK */
.tama-react-jump .tama-shell,.tama-react-jump .mini-shell{animation:tamaJump .6s cubic-bezier(.34,1.56,.64,1)}
@keyframes tamaJump{
  0%{transform:translateY(0) scale(1)}
  20%{transform:translateY(4px) scale(1.05,.92)}
  45%{transform:translateY(-30px) scale(.95,1.08)}
  65%{transform:translateY(-28px) scale(1)}
  80%{transform:translateY(2px) scale(1.03,.96)}
  100%{transform:translateY(0) scale(1)}
}
/* Wave reaction for ABOUT */
.tama-react-wave .tama-shell,.tama-react-wave .mini-shell{animation:tamaWave .6s cubic-bezier(.22,1,.36,1)}
@keyframes tamaWave{
  0%{transform:rotate(0)}
  20%{transform:rotate(-6deg)}
  40%{transform:rotate(6deg)}
  60%{transform:rotate(-4deg)}
  80%{transform:rotate(3deg)}
  100%{transform:rotate(0)}
}
/* Wink reaction for CONTACT */
.tama-react-wink .tama-shell,.tama-react-wink .mini-shell{animation:tamaWink .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes tamaWink{
  0%{transform:scale(1) rotate(0)}
  30%{transform:scale(1.08) rotate(3deg)}
  60%{transform:scale(1.05) rotate(-2deg)}
  100%{transform:scale(1) rotate(0)}
}

/* Hover reactions (gentle, looping while hovered) */
.tama-hover-work{animation:tamaHoverJump .6s cubic-bezier(.34,1.56,.64,1) infinite}
@keyframes tamaHoverJump{
  0%,100%{transform:translateY(0) scale(1)}
  30%{transform:translateY(-12px) scale(.97,1.04)}
  60%{transform:translateY(-10px) scale(1)}
  80%{transform:translateY(2px) scale(1.02,.97)}
}
.tama-hover-about{animation:tamaHoverShy .8s cubic-bezier(.22,1,.36,1) infinite}
@keyframes tamaHoverShy{
  0%,100%{transform:rotate(0) scale(1)}
  25%{transform:rotate(-3deg) scale(.97)}
  50%{transform:rotate(2deg) scale(.98)}
  75%{transform:rotate(-1deg) scale(.99)}
}
.tama-hover-contact{animation:tamaHoverWink .7s cubic-bezier(.34,1.56,.64,1) infinite}
@keyframes tamaHoverWink{
  0%,100%{transform:scale(1) rotate(0)}
  30%{transform:scale(1.05) rotate(2deg)}
  60%{transform:scale(1.03) rotate(-1deg)}
}

/* ===== KEYFRAMES ===== */
@keyframes marquee{0%{transform:translateX(-50%)}100%{transform:translateX(0)}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes flicker{0%,100%{opacity:1}50%{opacity:.95}75%{opacity:.98}}
@keyframes pxFlick{0%{opacity:0;background-size:40px 40px}25%{opacity:.7;background-size:20px 20px}50%{opacity:.12;background-size:10px 10px}75%{opacity:.8;background-size:5px 5px}100%{opacity:0;background-size:2px 2px}}
</style>

// ===== PIXEL AVATAR — Faithful to reference =====
// Character: pixel art avatar – black hair with gray highlights, white face, red hair clip, small smile
function EllaAvatar({size=180, mood='neutral', blinking=false, winking=false, shy=false}) {
  const E = '#191414', D = '#303F46', F = '#ffffff', R = '#ff0000', BLUSH = '#ff96b4';

  const renderEyes = () => {
    if (winking) return (
      <>
        {/* Left eye open */}
        <rect x="17" y="22" width="3" height="1" fill={E}/>
        <rect x="18" y="24" width="2" height="1" fill={E}/>
        <rect x="18" y="25" width="2" height="1" fill={E}/>
        <rect x="18" y="24" width="1" height="1" fill={F}/>
        {/* Right eyebrow */}
        <rect x="26" y="22" width="3" height="1" fill={E}/>
        {/* Right eye winking */}
        <rect x="26" y="25" width="2" height="1" fill={E}/>
        <rect x="25" y="25" width="1" height="1" fill={E} opacity=".4"/>
        <rect x="28" y="25" width="1" height="1" fill={E} opacity=".4"/>
      </>
    );
    if (blinking) return (
      <>
        <rect x="18" y="25" width="2" height="1" fill={E}/>
        <rect x="26" y="25" width="2" height="1" fill={E}/>
      </>
    );
    switch(mood) {
      case 'focused':
        return (<>
          <rect x="17" y="22" width="3" height="1" fill={E}/>
          <rect x="26" y="22" width="3" height="1" fill={E}/>
          <rect x="18" y="24" width="2" height="1" fill={E}/>
          <rect x="26" y="24" width="2" height="1" fill={E}/>
          {/* brow furrow */}
          <rect x="16" y="21" width="5" height="1" fill={E} opacity=".3"/>
          <rect x="25" y="21" width="5" height="1" fill={E} opacity=".3"/>
        </>);
      case 'soft':
        return (<>
          <rect x="17" y="22" width="3" height="1" fill={E}/>
          <rect x="26" y="22" width="3" height="1" fill={E}/>
          <rect x="18" y="24" width="2" height="1" fill={E}/>
          <rect x="26" y="24" width="2" height="1" fill={E}/>
          <rect x="18" y="25" width="2" height="1" fill={E}/>
          <rect x="26" y="25" width="2" height="1" fill={E}/>
          {/* gentle highlight */}
          <rect x="18" y="24" width="1" height="1" fill={F} opacity=".4"/>
          <rect x="27" y="24" width="1" height="1" fill={F} opacity=".4"/>
        </>);
      case 'sparkle':
        return (<>
          <rect x="17" y="22" width="3" height="1" fill={E}/>
          <rect x="26" y="22" width="3" height="1" fill={E}/>
          <rect x="18" y="24" width="2" height="1" fill={E}/>
          <rect x="26" y="24" width="2" height="1" fill={E}/>
          <rect x="18" y="25" width="2" height="1" fill={E}/>
          <rect x="26" y="25" width="2" height="1" fill={E}/>
          <rect x="18" y="24" width="1" height="1" fill={F}/>
          <rect x="27" y="24" width="1" height="1" fill={F}/>
          {/* sparkle dots */}
          <rect x="15" y="21" width="1" height="1" fill="#FF4632" opacity=".6"/>
          <rect x="30" y="21" width="1" height="1" fill="#FF4632" opacity=".6"/>
        </>);
      case 'happy':
        return (<>
          <rect x="17" y="22" width="3" height="1" fill={E}/>
          <rect x="26" y="22" width="3" height="1" fill={E}/>
          <rect x="18" y="24" width="2" height="1" fill={E}/>
          <rect x="26" y="24" width="2" height="1" fill={E}/>
          <rect x="17" y="24" width="1" height="1" fill={E}/>
          <rect x="25" y="24" width="1" height="1" fill={E}/>
        </>);
      case 'tired':
        return (<>
          {/* half-closed eyes */}
          <rect x="18" y="25" width="2" height="1" fill={E}/>
          <rect x="26" y="25" width="2" height="1" fill={E}/>
          <rect x="18" y="24" width="2" height="1" fill={E} opacity=".3"/>
          <rect x="26" y="24" width="2" height="1" fill={E} opacity=".3"/>
        </>);
      default: // neutral
        return (<>
          <rect x="17" y="22" width="3" height="1" fill={E}/>
          <rect x="26" y="22" width="3" height="1" fill={E}/>
          <rect x="18" y="24" width="2" height="1" fill={E}/>
          <rect x="26" y="24" width="2" height="1" fill={E}/>
          <rect x="18" y="25" width="2" height="1" fill={E}/>
          <rect x="26" y="25" width="2" height="1" fill={E}/>

// ===== SCROLL PROGRESS BAR =====
function ScrollProgress() {
  const [width,setWidth] = useState(0);
  useEffect(()=>{
    let ticking=false;
    const onScroll=()=>{
      if(ticking) return;
      ticking=true;
      requestAnimationFrame(()=>{
        const h=document.documentElement.scrollHeight-window.innerHeight;
        setWidth(h>0?(window.scrollY/h)*100:0);
        ticking=false;
      });
    };
    window.addEventListener('scroll',onScroll,{passive:true});
    return ()=>window.removeEventListener('scroll',onScroll);
  },[]);
  return <div className="scroll-progress" style={{width:`${width}%`}}/>;
}

// ===== MIXED FONT TITLE — serif / italic / pixel with hover interaction =====
function MixedTitle({text, pattern, className='', style={}}) {
  // Font classes cycle: serif, italic, pixel
  const fontClasses = ['f-serif','f-italic','f-pixel'];
  // Pattern defines which font each character uses (0=serif, 1=italic, 2=pixel)
  // If no pattern, generate a nice default mix
  const chars = text.split('');
  const defaultPattern = chars.map((_,i)=>{
    // Create a visually pleasing pseudo-random pattern
    const seed = (i * 7 + text.charCodeAt(Math.min(i, text.length-1)) * 3) % 10;
    if(seed < 4) return 0; // 40% serif
    if(seed < 7) return 1; // 30% italic
    return 2;              // 30% pixel
  });
  const pat = pattern || defaultPattern;

  // State tracks current font index per character
  const [fonts, setFonts] = useState(pat);

  const handleMouseEnter = useCallback((idx)=>{
    setFonts(prev=>{
      const next = [...prev];
      // Cycle to next font for hovered char and ripple to neighbors
      for(let d = -1; d <= 1; d++){
        const t = idx + d;
        if(t >= 0 && t < next.length && chars[t] !== ' '){
          next[t] = (next[t] + 1) % 3;
        }
      }
      return next;
    });
  },[chars.length]);

  return (
    <span className={`mixed-title ${className}`} style={style}>
      {chars.map((ch,i)=>{
        if(ch === ' ') return <span key={i} className="mixed-char f-space">{'\u00A0'}</span>;
        return (
          <span key={i} className={`mixed-char ${fontClasses[fonts[i] || 0]}`}
            onMouseEnter={()=>handleMouseEnter(i)}
          >{ch}</span>
        );
      })}
    </span>
  );
}
